name: Daily Streak Update

on:
  schedule:
    - cron: '30 16 * * *'
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Add today's log entry
        run: |
          echo "## $(date '+%Y-%m-%d')" >> streak-log.md
          echo "- Logged in. Kuch naya seekha ya kuch chhota fix kiya." >> streak-log.md
          echo "" >> streak-log.md

      - name: Commit and push
        run: |
          git config user.name "Ayush Trivedi"
          git config user.email "${{ secrets.GIT_EMAIL }}"
          git add streak-log.md
          git commit -m "log: $(date '+%Y-%m-%d')" || echo "Nothing to commit"
          git push
